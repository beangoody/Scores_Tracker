{% extends "base.html" %}
{% block title %}Log in — Trackr{% endblock %}

{% block content %}
<div style="max-width:400px; margin:4rem auto; padding:0 1.25rem;">

  <div style="text-align:center; margin-bottom:2rem;">
    <div style="font-family:'Playfair Display',serif; font-size:2rem; color:var(--accent); margin-bottom:0.25rem;">Trackr</div>
    <div style="font-size:0.85rem; color:var(--text-light);">Track every match. Own every stat.</div>
  </div>

  <div class="card">
    <div class="card-title">Log in</div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" name="username"
               value="{{ username }}" autocomplete="username"
               autofocus required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
               autocomplete="current-password" required>
      </div>

      <div class="form-group" style="display:flex; align-items:center; gap:0.5rem;">
        <input type="checkbox" id="remember" name="remember"
               style="width:16px; height:16px; accent-color:var(--accent);">
        <label for="remember" style="font-size:0.82rem; color:var(--mist); cursor:pointer;">
          Keep me logged in
        </label>
      </div>

      <button type="submit" class="btn btn-primary">Log in</button>

      <div style="text-align:right; margin-top:0.75rem;">
        <a href="{{ url_for('auth.forgot_password') }}" style="font-size:0.78rem; color:var(--text-light); text-decoration:none;">Forgot password?</a>
      </div>
    </form>
  </div>

  <p style="text-align:center; margin-top:1.25rem; font-size:0.85rem; color:var(--text-light);">
    Don't have an account?
    <a href="{{ url_for('auth.register') }}" style="color:var(--accent); text-decoration:none;">Create one</a>
  </p>

</div>
{% endblock %}
